<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PHANTOM TRACKER: PRO</title>
    <style>
        :root { --bg: #050505; --accent: #39ff14; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: monospace; overflow: hidden; }
        
        /* Layout */
        #game-interface { display: none; grid-template-columns: 250px 1fr 250px; height: 100vh; }
        .screen { display: none; width: 100vw; height: 100vh; place-content: center; text-align: center; }
        .active { display: grid; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); display: none; place-content: center; z-index: 1000; }
        
        button { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 15px; cursor: pointer; margin: 10px; }
        button:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <!-- Difficulty Selection -->
    <div id="main-menu" class="screen active">
        <h1>PHANTOM TRACKER</h1>
        <button onclick="gameState.init('EASY')">EASY (Slow Ghost, +$100)</button>
        <button onclick="gameState.init('MID')">MID (Normal, +$200)</button>
        <button onclick="gameState.init('HARD')">HARD (Fast Ghost, +$500)</button>
    </div>

    <div id="game-interface">
        <aside class="hud"><h3>DEBUG: KITCHEN LOCKED</h3></aside>
        <main><canvas id="canvas"></canvas></main>
        <aside class="hud"><button onclick="gameState.exit()">EXIT</button></aside>
    </div>

    <!-- Notification Modal -->
    <div id="modal" class="modal">
        <div style="background:#111; padding:40px; border:1px solid var(--accent);">
            <h2 id="modal-text"></h2>
            <button onclick="location.reload()">OK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const gameState = {
            difficulty: 'EASY',
            ghostSpeed: 1,
            reward: 100,
            
            init(level) {
                this.difficulty = level;
                if(level === 'MID') { this.ghostSpeed = 2; this.reward = 200; }
                if(level === 'HARD') { this.ghostSpeed = 4; this.reward = 500; }
                
                document.getElementById('main-menu').classList.remove('active');
                document.getElementById('game-interface').style.display = 'grid';
                this.start();
            },
            
            start() { /* Game Loop Logic */ },
            
            exit() {
                document.getElementById('modal-text').innerText = "Mission Complete. Difficulty: " + this.difficulty + " | Earnings: $" + this.reward;
                document.getElementById('modal').style.display = 'grid';
            }
        };

        // Kitchen restriction logic
        window.onkeydown = (e) => {
            // If player tries to move into kitchen coordinates, stop them
            // Example: if (player.x > 235 && player.x < 500) return;
        };
    </script>
</body>
</html>
